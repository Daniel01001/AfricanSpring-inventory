# Render blueprint — provisions the web service + a free Postgres and wires them.
# Deploy: push this repo to GitHub, then Render → New → Blueprint → pick the repo.

databases:
  - name: africanspring-db
    databaseName: africanspring
    plan: free

services:
  - type: web
    name: africanspring-ice
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /Login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: africanspring-db
          property: connectionString
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Set these in the Render dashboard (Environment tab), then redeploy.
      # They seed the first logins on the empty database.
      - key: SEED_OWNER_PIN
        sync: false
      - key: SEED_FRIEND_PIN
        sync: false
